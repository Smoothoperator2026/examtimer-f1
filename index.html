<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Pro Stopwatch</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--f1-black:#050505;
--f1-card-bg:#15151e;
--f1-red:#e10600;
--f1-white:#fff;
--status-purple:#b620e0;
--status-green:#00d21e;
--status-yellow:#fff200;
}

body{
background:var(--f1-black);
color:white;
font-family:Orbitron;
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
}

#main-screen{
width:100%;
max-width:500px;
display:flex;
flex-direction:column;
height:100%;
}

.header-area{
padding:15px;
background:black;
}

.timer-display{
text-align:center;
font-size:3rem;
font-family:"Roboto Mono";
}

.scroll-area{
flex:1;
overflow-y:auto;
padding:10px;
}

.sector-row{
display:grid;
grid-template-columns:80px 1fr 1fr 1fr;
background:#15151e;
margin-bottom:6px;
padding:10px;
border-radius:4px;
}

.row-purple{background:var(--status-purple)}
.row-green{background:var(--status-green);color:black}
.row-yellow{background:var(--status-yellow);color:black}

.footer-area{
padding:10px;
}

.f1-btn{
width:85px;
height:85px;
border-radius:50%;
border:none;
font-family:Orbitron;
font-weight:bold;
}

.btn-start{background:#e10600;color:white}
.btn-split{background:white;color:black}

.count-btn{
width:60px;
height:60px;
font-size:2rem;
border-radius:12px;
border:none;
background:#333;
color:white;
}

</style>
</head>

<body>

<div id="main-screen">

<div class="header-area">
<div class="timer-display" id="main-timer">00:00.00</div>
</div>

<div class="scroll-area" id="scroll-container">
<div id="sector-list"></div>
</div>

<div class="footer-area">
<div id="btn-area"></div>
</div>

</div>

<script>

let sectors = JSON.parse(localStorage.getItem('f1-data')) || [
{target:250,best:null},
{target:250,best:null},
{target:250,best:null}
];

let continueSectors=[];
let mode="READY";

let startTime;
let timerInterval;

let lapTimes=[];
let currentIdx=0;

function renderMain(){

const list=document.getElementById("sector-list");
list.innerHTML="";

sectors.forEach((s,i)=>{

const row=document.createElement("div");
row.className="sector-row";
row.id="row-"+i;

row.innerHTML=`
<div>S${i+1}</div>
<div id="t-${i}">--</div>
<div>${s.best??"--"}</div>
<div>${s.target}</div>
`;

list.appendChild(row);

});

continueSectors.forEach((c,i)=>{

const row=document.createElement("div");
row.className="sector-row";
row.innerHTML=`CONT ${i+1} ${c.time??"--"}`;

list.appendChild(row);

});

renderButtons();

}

function renderButtons(){

const area=document.getElementById("btn-area");
area.innerHTML="";

if(mode==="READY"){

area.appendChild(btn("START","btn-start",startSession));

}

else if(mode==="RUNNING"){

area.appendChild(btn("STOP","btn-start",stopTimer));
area.appendChild(btn("SECTOR","btn-split",recordSector));

}

}

function btn(text,cls,fn){

const b=document.createElement("button");
b.className="f1-btn "+cls;
b.innerText=text;
b.onclick=fn;
return b;

}

function startSession(){

mode="RUNNING";
currentIdx=0;
lapTimes=[];
continueSectors=[];

startTime=Date.now();

runTimer();

renderMain();

}

function stopTimer(){

clearInterval(timerInterval);

mode="READY";

renderMain();

}

function runTimer(){

timerInterval=setInterval(()=>{

const d=Date.now()-startTime;

const m=Math.floor(d/60000);
const s=Math.floor((d%60000)/1000);
const ms=Math.floor((d%1000)/10);

document.getElementById("main-timer").innerText=
`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(ms).padStart(2,"0")}`;

},50);

}

function recordSector(){

const total=Date.now()-startTime;

const sectorTime=total-(lapTimes.reduce((a,b)=>a+b,0));

lapTimes.push(sectorTime);

const row=document.getElementById("t-"+currentIdx);
row.innerText=(sectorTime/1000).toFixed(2);

currentIdx++;

renderMain();

setTimeout(scrollToLatest,50);

}

function scrollToLatest(){

const sc=document.getElementById("scroll-container");
const rows=document.querySelectorAll(".sector-row");

if(rows.length===0)return;

const rowHeight=rows[0].offsetHeight;

const visibleCount=Math.floor(sc.clientHeight/rowHeight);

let idx=currentIdx;

if(idx<=visibleCount)return;

const targetIndex=idx-2;

const targetRow=rows[targetIndex];

if(!targetRow)return;

let ratio=0.35;

const width=window.innerWidth;

if(width<500)ratio=0.45;
else if(width<900)ratio=0.40;
else ratio=0.30;

const pos=targetRow.offsetTop-(sc.clientHeight*ratio);

sc.scrollTo({
top:Math.max(0,pos),
behavior:"smooth"
});

}

renderMain();

</script>

</body>
</html>
