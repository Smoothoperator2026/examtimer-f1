<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExamStopwatch-V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-black: #050505; --f1-card-bg: #15151e; --f1-red: #e10600; --f1-white: #ffffff;
            --status-green: #00d21e; --status-yellow: #fff200;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--f1-black); color: var(--f1-white); font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* タイマー表示 */
        .header-area { padding: 25px 15px; text-align: center; }
        #main-timer { font-size: 3.5rem; font-family: 'Roboto Mono'; font-weight: 700; tabular-nums; }
        #main-timer span { color: var(--f1-red); }

        /* セクターリスト */
        .scroll-area { flex: 1; overflow-y: auto; padding: 0 15px; }
        .sector-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 120px; }
        .sector-row { 
            display: grid; grid-template-columns: 50px 1.2fr 1fr 1fr; align-items: center; 
            background: var(--f1-card-bg); height: 80px; padding: 0 15px; border-radius: 4px; border-left: 4px solid #333;
        }
        .row-active { border-left-color: var(--f1-red); background: #1f1f2a; }
        .row-green { background: var(--status-green) !important; color: #000; border-left-color: #008f14 !important; }
        .row-yellow { background: var(--status-yellow) !important; color: #000; border-left-color: #b3a700 !important; }

        .s-name { font-weight: bold; font-size: 0.85rem; color: #888; }
        .s-value { font-family: 'Roboto Mono'; font-size: 1.2rem; font-weight: bold; }
        .target-val { font-family: 'Roboto Mono'; font-size: 0.8rem; color: #666; }
        .d-tg { font-family: 'Roboto Mono'; font-size: 1.1rem; font-weight: bold; text-align: right; }

        /* フッターボタン */
        .footer-area { background: rgba(0,0,0,0.9); padding: 15px 15px 40px; border-top: 1px solid #222; }
        .btn-container { display: flex; justify-content: space-around; gap: 15px; }
        .f1-btn { min-width: 80px; height: 80px; border-radius: 50%; border: none; font-family: 'Orbitron'; font-weight: bold; font-size: 0.8rem; }
        .btn-start { background: var(--f1-red); color: white; }
        .btn-split { background: var(--f1-white); color: black; }
        .btn-config { background: #333; color: white; font-size: 1.5rem; }
        .btn-reset { background: #444; color: white; }

        /* V13 設定画面スタイル */
        #config-screen { display: none; position: fixed; inset: 0; background: var(--f1-black); z-index: 1000; padding: 30px; overflow-y: auto; }
        .config-item { background: var(--f1-card-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .config-input { background: #000; color: #fff; border: 1px solid #444; padding: 10px; width: 100px; text-align: center; font-family: 'Roboto Mono'; font-size: 1.2rem; border-radius: 6px; }
        .save-btn { width: 100%; padding: 20px; background: var(--f1-white); color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="main-screen">
    <div class="header-area">
        <div id="main-timer">00<span>:</span>00<span>.</span>00</div>
    </div>
    <div class="scroll-area">
        <div class="sector-list" id="sector-list"></div>
    </div>
    <div class="footer-area"><div class="btn-container" id="btn-area"></div></div>
</div>

<div id="config-screen">
    <h2 style="text-align:center; margin-bottom:20px;">V13 CONFIG</h2>
    <div id="config-list"></div>
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="addQ()" style="flex:1; padding:15px; background:#333; color:#fff; border:none; border-radius:8px;">+ ADD Q</button>
        <button onclick="removeQ()" style="flex:1; padding:15px; background:#333; color:#fff; border:none; border-radius:8px;">- REMOVE</button>
    </div>
    <button class="save-btn" onclick="saveConfig()">SAVE & CLOSE</button>
</div>

<script>
    let sectors = JSON.parse(localStorage.getItem('f1-v13-data')) || [{target: 250}, {target: 250}, {target: 250}];
    let mode = "READY", currentIdx = 0, lapTimes = [], timerInterval, startTime = 0, totalElapsed = 0;

    function renderMain() {
        const list = document.getElementById('sector-list');
        list.innerHTML = '';
        sectors.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'sector-row';
            if (i === currentIdx && mode !== "FINISHED") row.classList.add('row-active');
            
            let timeVal = "--.--";
            let delta = "";
            
            if (lapTimes[i]) {
                timeVal = (lapTimes[i]/1000).toFixed(2);
                const diff = (Math.floor(lapTimes[i]/100) - s.target) / 10;
                delta = (diff > 0 ? "+" : "") + diff.toFixed(1);
                row.classList.add(diff <= 0 ? 'row-green' : 'row-yellow');
            } else if (i === currentIdx && mode !== "READY") {
                const curLapMs = totalElapsed - (lapTimes.reduce((a,b)=>a+b, 0));
                timeVal = (curLapMs/1000).toFixed(2);
            }

            row.innerHTML = `
                <div class="s-name">Q${i+1}</div>
                <div class="s-value">${timeVal}</div>
                <div class="target-val">TG: ${(s.target/10).toFixed(1)}</div>
                <div class="d-tg">${delta}</div>
            `;
            list.appendChild(row);
        });
        renderButtons();
    }

    function renderButtons() {
        const area = document.getElementById('btn-area');
        area.innerHTML = '';
        if (mode === "READY") {
            area.appendChild(createBtn("btn-config", "⚙️", openConfig));
            area.appendChild(createBtn("btn-start", "START", start));
        } else if (mode === "RUNNING") {
            area.appendChild(createBtn("btn-start", "STOP", stop));
            area.appendChild(createBtn("btn-split", "LAP", lap));
        } else {
            area.appendChild(createBtn("btn-reset", "RESET", reset));
            area.appendChild(createBtn("btn-start", "CONT", start));
        }
    }

    function createBtn(c, t, f) { const b = document.createElement('button'); b.className = `f1-btn ${c}`; b.innerText = t; b.onclick = f; return b; }

    function start() {
        mode = "RUNNING";
        startTime = Date.now() - totalElapsed;
        timerInterval = setInterval(() => {
            totalElapsed = Date.now() - startTime;
            updateDisplay();
        }, 50);
    }

    function updateDisplay() {
        const m = Math.floor(totalElapsed/60000), s = Math.floor((totalElapsed%60000)/1000), ms = Math.floor((totalElapsed%1000)/10);
        document.getElementById('main-timer').innerHTML = `${m.toString().padStart(2,'0')}<span>:</span>${s.toString().padStart(2,'0')}<span>.</span>${ms.toString().padStart(2,'0')}`;
        renderMain();
    }

    function stop() { clearInterval(timerInterval); mode = "PAUSED"; renderMain(); }

    function lap() {
        const lapMs = totalElapsed - (lapTimes.reduce((a,b)=>a+b, 0));
        lapTimes.push(lapMs);
        currentIdx++;
        if (currentIdx >= sectors.length) { stop(); mode = "FINISHED"; }
        renderMain();
    }

    function reset() { clearInterval(timerInterval); mode = "READY"; currentIdx = 0; lapTimes = []; totalElapsed = 0; document.getElementById('main-timer').innerHTML = "00<span>:</span>00<span>.</span>00"; renderMain(); }

    // --- CONFIG ---
    function openConfig() { document.getElementById('config-screen').style.display='block'; renderConfig(); }
    function renderConfig() {
        const list = document.getElementById('config-list');
        list.innerHTML = sectors.map((s, i) => `
            <div class="config-item">
                <span class="s-name">Q${i+1} TARGET</span>
                <input type="number" step="0.1" class="config-input" value="${(s.target/10).toFixed(1)}" id="q-${i}">
            </div>
        `).join('');
    }
    function addQ() { sectors.push({target: 250}); renderConfig(); }
    function removeQ() { if(sectors.length > 1) sectors.pop(); renderConfig(); }
    function saveConfig() {
        sectors.forEach((s, i) => { s.target = parseFloat(document.getElementById(`q-${i}`).value) * 10; });
        localStorage.setItem('f1-v13-data', JSON.stringify(sectors));
        document.getElementById('config-screen').style.display='none';
        renderMain();
    }

    renderMain();
</script>
</body>
</html>
