<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Pro Stopwatch v6</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-black: #050505;
            --f1-card-bg: #15151e;
            --f1-red: #e10600;
            --f1-white: #ffffff;
            --status-purple: #b620e0; 
            --status-green: #00d21e;  
            --status-yellow: #fff200; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--f1-black);
            color: var(--f1-white);
            font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; /* 画面全体の高さを固定 */
            overflow: hidden; /* ボディ全体のスクロールを禁止 */
        }

        #main-screen { 
            width: 100%; max-width: 500px; 
            display: flex; flex-direction: column; 
            height: 100%; /* 親要素いっぱいに広げる */
        }

        /* --- タイマーを上部に固定 --- */
        .header-area {
            position: sticky; top: 0; z-index: 100;
            background-color: var(--f1-black);
            padding: 15px; width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .timer-display {
            text-align: center; background: #000; border-radius: 10px; padding: 15px;
            border-left: 5px solid var(--f1-red);
        }
        #main-timer { font-size: 3.2rem; font-family: 'Roboto Mono'; font-weight: 700; }
        #main-timer span { color: var(--f1-red); }

        /* --- セクターリストだけをスクロール可能に --- */
        .scroll-area {
            flex: 1; /* 残りのスペースをすべて使う */
            overflow-y: auto; /* 縦スクロールを許可 */
            padding: 0 15px 20px 15px;
            -webkit-overflow-scrolling: touch;
        }

        .sector-list { display: flex; flex-direction: column; gap: 8px; }

        .sector-row {
            display: grid; grid-template-columns: 80px 1fr 1fr 1fr; align-items: center;
            background: var(--f1-card-bg); padding: 12px 10px; border-radius: 4px; gap: 8px;
            border-left: 4px solid #333; transition: 0.3s;
        }

        .s-name { font-weight: bold; font-size: 0.9rem; color: #888; }
        .s-box { display: flex; flex-direction: column; }
        .s-label { font-size: 0.55rem; color: #555; text-transform: uppercase; margin-bottom: 2px; }
        .s-value { font-family: 'Roboto Mono'; font-size: 1rem; font-weight: bold; }
        .s-delta-box { text-align: right; line-height: 1.2; }
        .d-tg { font-family: 'Roboto Mono'; font-size: 0.85rem; font-weight: bold; display: block; }
        .d-pb { font-family: 'Roboto Mono'; font-size: 0.75rem; color: #888; display: block; }

        .row-purple { background: var(--status-purple); border-left-color: #fff; color: #fff; }
        .row-green  { background: var(--status-green);  border-left-color: #000; color: #000; }
        .row-yellow { background: var(--status-yellow); border-left-color: #000; color: #000; }
        .row-purple .s-label, .row-purple .s-name, .row-purple .d-pb { color: rgba(255,255,255,0.7); }
        .row-green .s-label, .row-green .s-name, .row-green .d-pb,
        .row-yellow .s-label, .row-yellow .s-name, .row-yellow .d-pb { color: rgba(0,0,0,0.6); }

        /* --- 操作ボタンを最下部に固定 --- */
        .footer-area {
            background-color: var(--f1-black);
            padding: 10px 15px 20px 15px; width: 100%;
            border-top: 1px solid #222;
        }

        .btn-container { display: flex; justify-content: space-around; gap: 10px; flex-wrap: wrap; }
        .f1-btn {
            min-width: 80px; height: 80px; border-radius: 50%; border: none; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .btn-start { background: var(--f1-red); color: white; font-size: 0.7rem; }
        .btn-split { background: var(--f1-white); color: black; font-size: 0.7rem; }
        .btn-config { background: #333; color: white; font-size: 1.2rem; }
        .btn-continue { background: #005bb7; color: white; font-size: 0.6rem; border: 2px solid #fff; }
        .btn-finish { background: #444; color: white; font-size: 0.6rem; }

        /* 設定画面 */
        #config-screen { display: none; width: 100%; max-width: 500px; padding: 20px; flex-direction: column; gap: 20px; height: 100vh; overflow-y: auto; }
        .config-card { background: var(--f1-card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .picker-group { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 15px 0; }
        .f1-picker {
            height: 150px; width: 60px; overflow-y: scroll; scroll-snap-type: y mandatory;
            background: #000; border-radius: 8px; border: 1px solid #444; scrollbar-width: none;
        }
        .f1-picker::-webkit-scrollbar { display: none; }
        .f1-picker div { height: 50px; display: flex; align-items: center; justify-content: center; scroll-snap-align: center; font-family: 'Roboto Mono'; font-size: 1.4rem; color: #444; }
        .f1-picker div.active { color: var(--f1-white); font-size: 1.8rem; font-weight: bold; }
        .save-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: var(--f1-white); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

<div id="main-screen">
    <div class="header-area">
        <div class="timer-display">
            <div id="main-timer">00<span>:</span>00<span>.</span>00</div>
        </div>
    </div>

    <div class="scroll-area" id="scroll-container">
        <div class="sector-list" id="sector-list"></div>
    </div>

    <div class="footer-area">
        <div class="btn-container" id="btn-area"></div>
    </div>
</div>

<div id="config-screen">
    <div class="config-card">
        <div style="display:flex; justify-content: space-between; margin-bottom:20px;">
            <h3>SECTOR SETTINGS</h3>
            <div style="background:#000; padding:5px 15px; border-radius:20px;">
                <button onclick="changeCount(-1)" style="background:none; border:none; color:white;">-</button>
                <span id="display-count" style="margin:0 10px;">3</span>
                <button onclick="changeCount(1)" style="background:none; border:none; color:white;">+</button>
            </div>
        </div>
        <div id="config-items"></div>
        <button class="save-btn" id="btn-save" style="margin-top:20px;">SAVE CONFIG</button>
    </div>
</div>

<script>
    let sectors = JSON.parse(localStorage.getItem('f1-v5-data')) || [
        { target: 250, best: null }, { target: 250, best: null }, { target: 250, best: null }
    ];
    let continueSectors = [];
    let isRunning = false, startTime, timerInterval, currentIdx = 0, lapTimes = [], mode = "READY"; 

    function renderMain() {
        const list = document.getElementById('sector-list');
        list.innerHTML = '';
        sectors.forEach((s, i) => {
            const row = createRow(`S${i+1}`, s.target, s.best, i, false);
            if (lapTimes[i] !== undefined) applySectorStats(row, i, lapTimes[i], s, false);
            list.appendChild(row);
        });
        continueSectors.forEach((cs, i) => {
            const row = createRow(`CONT ${i+1}`, null, null, i, true);
            if (cs.time !== null) applySectorStats(row, i, cs.time, null, true);
            list.appendChild(row);
        });
        renderButtons();
    }

    function createRow(name, target, best, idx, isContinue) {
        const row = document.createElement('div');
        row.className = 'sector-row';
        row.id = isContinue ? `crow-${idx}` : `row-${idx}`;
        const targetDisp = target ? (target/10).toFixed(1) : "---";
        const bestDisp = best ? (best/10).toFixed(1) : "---";
        row.innerHTML = `<div class="s-name">${name}</div><div class="s-box"><span class="s-label">TIME</span><span class="s-value" id="${isContinue?'ct':'t'}-${idx}">--.--</span></div><div class="s-box"><span class="s-label">PB / TG</span><span class="s-value" style="color:#666; font-size:0.8rem;">${bestDisp} / ${targetDisp}</span></div><div class="s-delta-box"><span class="d-tg" id="${isContinue?'cd-tg':'d-tg'}-${idx}">---</span><span class="d-pb" id="${isContinue?'cd-pb':'d-pb'}-${idx}">---</span></div>`;
        return row;
    }

    function applySectorStats(rowEl, idx, ms, sectorObj, isContinue) {
        const timeEl = rowEl.querySelector(isContinue ? `#ct-${idx}` : `#t-${idx}`);
        const tgDeltaEl = rowEl.querySelector(isContinue ? `#cd-tg-${idx}` : `#d-tg-${idx}`);
        const pbDeltaEl = rowEl.querySelector(isContinue ? `#cd-pb-${idx}` : `#d-pb-${idx}`);
        timeEl.innerText = (ms/1000).toFixed(2);
        const tenths = Math.floor(ms / 100);
        if (!isContinue && sectorObj) {
            tgDeltaEl.innerText = "TG: " + ((tenths - sectorObj.target)/10).toFixed(1).replace(/^([^+-])/, '+$1');
            if (sectorObj.best_at_start) pbDeltaEl.innerText = "PB: " + ((tenths - sectorObj.best_at_start)/10).toFixed(1).replace(/^([^+-])/, '+$1');
            if (sectorObj.resultColor) rowEl.classList.add(`row-${sectorObj.resultColor}`);
        } else {
            rowEl.classList.add('row-green');
        }
    }

    function renderButtons() {
        const area = document.getElementById('btn-area');
        area.innerHTML = '';
        if (mode === "READY") {
            area.appendChild(createBtn("btn-config", "⚙️", openConfig));
            area.appendChild(createBtn("btn-start", "START", startSession));
        } else if (mode === "RUNNING") {
            area.appendChild(createBtn("btn-start", "STOP", stopSession));
            area.appendChild(createBtn("btn-split", "SECTOR", recordSector));
        } else if (mode === "FINISHED") {
            area.appendChild(createBtn("btn-start", "RESET", resetAll));
            area.appendChild(createBtn("btn-continue", "CONTINUE", startContinue));
        } else if (mode === "CONT_RUNNING") {
            area.appendChild(createBtn("btn-start", "STOP", stopContinue));
        } else if (mode === "CONT_STOPPED") {
            area.appendChild(createBtn("btn-finish", "FINISH & RESET", resetAll));
            area.appendChild(createBtn("btn-continue", "CONTINUE", startContinue));
        }
    }

    function createBtn(cls, txt, fn) {
        const b = document.createElement('button'); b.className = `f1-btn ${cls}`; b.innerText = txt; b.onclick = fn; return b;
    }

    function startSession() {
        mode = "RUNNING"; isRunning = true; startTime = Date.now(); currentIdx = 0; lapTimes = []; continueSectors = [];
        sectors.forEach(s => { s.best_at_start = s.best; s.resultColor = null; });
        renderMain(); startTimer();
    }

    function recordSector() {
        if (currentIdx < sectors.length) {
            const sectorMs = (Date.now() - startTime) - lapTimes.reduce((a,b)=>a+b, 0);
            lapTimes.push(sectorMs);
            const tenths = Math.floor(sectorMs / 100);
            const s = sectors[currentIdx];
            if (s.best === null) { s.resultColor = 'green'; s.best = tenths; }
            else if (tenths < s.best) { s.resultColor = 'purple'; s.best = tenths; }
            else if (tenths <= s.target) { s.resultColor = 'green'; }
            else { s.resultColor = 'yellow'; }
            renderMain();
            currentIdx++;
            if (currentIdx === sectors.length) { clearInterval(timerInterval); mode = "FINISHED"; renderMain(); }
            localStorage.setItem('f1-v5-data', JSON.stringify(sectors));
            // 自動で一番下までスクロール
            const scroller = document.getElementById('scroll-container');
            scroller.scrollTop = scroller.scrollHeight;
        }
    }

    function startContinue() {
        mode = "CONT_RUNNING"; continueSectors.push({ time: null });
        renderMain(); startTime = Date.now(); startTimer();
        const scroller = document.getElementById('scroll-container');
        scroller.scrollTop = scroller.scrollHeight;
    }

    function stopContinue() {
        clearInterval(timerInterval);
        continueSectors[continueSectors.length - 1].time = Date.now() - startTime;
        mode = "CONT_STOPPED"; renderMain();
    }

    function stopSession() { clearInterval(timerInterval); mode = "FINISHED"; renderMain(); }
    function resetAll() { clearInterval(timerInterval); mode = "READY"; continueSectors = []; lapTimes = []; renderMain(); document.getElementById('main-timer').innerHTML = "00<span>:</span>00<span>.</span>00"; }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000), ms = Math.floor((diff%1000)/10);
            document.getElementById('main-timer').innerHTML = `${m.toString().padStart(2,'0')}<span>:</span>${s.toString().padStart(2,'0')}<span>.</span>${ms.toString().padStart(2,'0')}`;
        }, 50);
    }

    function openConfig() { document.getElementById('main-screen').style.display='none'; document.getElementById('config-screen').style.display='flex'; renderConfig(); }
    function changeCount(n) { if (n > 0 && sectors.length < 10) sectors.push({target: 250, best: null}); else if (n < 0 && sectors.length > 1) sectors.pop(); renderConfig(); }
    function renderConfig() {
        document.getElementById('display-count').innerText = sectors.length;
        const container = document.getElementById('config-items'); container.innerHTML = '';
        sectors.forEach((s, i) => {
            const m = Math.floor((s.target%36000)/600), sec = Math.floor((s.target%600)/10), t = s.target%10;
            const div = document.createElement('div');
            div.innerHTML = `<p style="color:#888; font-size:0.7rem; margin-top:10px;">SECTOR ${i+1}</p><div class="picker-group">${genPicker(i,'m',59,m,'MIN')} ${genPicker(i,'s',59,sec,'SEC')} ${genPicker(i,'t',9,t,'1/10')}</div>`;
            container.appendChild(div);
        });
    }
    function genPicker(sIdx, type, max, current, label) {
        let items = '<div></div>'; for(let i=0; i<=max; i++) items += `<div class="${i===current?'active':''}" data-val="${i}">${i.toString().padStart(2,'0')}</div>`; items += '<div></div>';
        return `<div class="picker-wrap"><label style="font-size:0.5rem; color:#555;">${label}</label><div class="f1-picker" onscroll="onPickerScroll(this,${sIdx},'${type}')">${items}</div></div>`;
    }
    function onPickerScroll(el, sIdx, type) {
        const idx = Math.round(el.scrollTop / 50);
        const children = el.querySelectorAll('div'); children.forEach((c, i) => c.className = (i === idx+1) ? 'active' : '');
        let cur = sectors[sIdx].target; let m = Math.floor((cur%36000)/600), s = Math.floor((cur%600)/10), t = cur%10;
        if(type==='m') m=idx; if(type==='s') s=idx; if(type==='t') t=idx;
        sectors[sIdx].target = (m*600)+(s*10)+t;
    }
    document.getElementById('btn-save').onclick = () => { localStorage.setItem('f1-v5-data', JSON.stringify(sectors)); document.getElementById('config-screen').style.display='none'; document.getElementById('main-screen').style.display='flex'; renderMain(); };

    renderMain();
</script>
</body>
</html>
