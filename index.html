<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExamStopwatch-F1-V22</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-black: #050505; --f1-card-bg: #15151e; --f1-red: #e10600; --f1-white: #ffffff;
            --status-purple: #b620e0; --status-green: #00d21e; --status-yellow: #fff200;
            --cont-bg: #1a1a2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--f1-black); color: var(--f1-white); font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        #main-screen { width: 100%; max-width: 600px; display: flex; flex-direction: column; height: 100%; }
        .header-area { padding: 15px; }
        .timer-display { text-align: center; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 15px; border-left: 5px solid var(--f1-red); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #main-timer { font-size: 3rem; font-family: 'Roboto Mono'; font-weight: 700; font-variant-numeric: tabular-nums; }
        #main-timer span { color: var(--f1-red); }

        .scroll-area { flex: 1; overflow-y: auto; padding: 0 15px; }
        .sector-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 100px; }
        
        .sector-row { 
            display: grid; grid-template-columns: 60px 1.2fr 1fr 1fr; align-items: center; 
            background: var(--f1-card-bg); height: 85px; padding: 0 12px; border-radius: 4px; border-left: 4px solid #333;
            transition: all 0.2s;
        }
        .row-active { border-left-color: var(--f1-red) !important; background: #1f1f2a; transform: scale(1.02); z-index: 10; }
        .row-past { opacity: 0.6; }
        .mode-finished .row-past { opacity: 1; }

        .s-name { font-weight: bold; font-size: 0.8rem; color: #888; }
        .s-value { font-family: 'Roboto Mono'; font-size: 1.1rem; font-weight: bold; }
        .target-val { font-family: 'Roboto Mono'; font-size: 0.85rem; color: #aaa; }
        .d-tg { font-family: 'Roboto Mono'; font-size: 1.1rem; font-weight: bold; }
        .delta-plus { color: var(--f1-red); }
        .delta-minus { color: var(--status-green); }

        /* ボタン */
        .footer-area { background: rgba(0,0,0,0.9); padding: 10px 15px 30px; border-top: 1px solid #222; }
        .btn-container { display: flex; justify-content: space-around; gap: 10px; }
        .f1-btn { min-width: 80px; height: 80px; border-radius: 50%; border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--f1-red); color: white; }
        .btn-split { background: var(--f1-white); color: black; }
        .btn-config { background: #333; color: white; font-size: 1.5rem; }
        .btn-reset { background: #444; color: white; font-size: 0.7rem; }

        /* V18 設定画面 */
        #config-screen { display: none; position: fixed; inset: 0; background: var(--f1-black); z-index: 1000; padding: 20px; overflow-y: auto; }
        .config-item { background: var(--f1-card-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .config-input { background: #000; color: var(--f1-red); border: 1px solid #444; padding: 8px; width: 100px; text-align: center; font-family: 'Roboto Mono'; font-size: 1.2rem; border-radius: 4px; }
        .save-btn { width: 100%; padding: 18px; background: var(--f1-white); color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; font-family: 'Orbitron'; }

        /* リザルト用色判定 */
        .row-green  { background: var(--status-green) !important; color: #000; border-left-color: #008f14 !important; }
        .row-yellow { background: var(--status-yellow) !important; color: #000; border-left-color: #b3a700 !important; }
        .row-cont { background: var(--cont-bg); }
    </style>
</head>
<body>

<div id="main-screen">
    <div class="header-area">
        <div class="timer-display"><div id="main-timer">00<span>:</span>00<span>.</span>00</div></div>
    </div>
    <div class="scroll-area" id="scroll-container">
        <div class="sector-list" id="sector-list"></div>
    </div>
    <div class="footer-area"><div class="btn-container" id="btn-area"></div></div>
</div>

<div id="config-screen">
    <h2 style="text-align:center; margin-bottom:20px; letter-spacing: 2px;">V18 CONFIG</h2>
    <div id="config-list"></div>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="addSectorConfig()" style="flex:1; padding:15px; background:#333; color:#fff; border:none; border-radius:4px; font-weight:bold;">+ ADD Q</button>
        <button onclick="removeSectorConfig()" style="flex:1; padding:15px; background:#333; color:#fff; border:none; border-radius:4px; font-weight:bold;">- REMOVE</button>
    </div>
    <button class="save-btn" onclick="saveConfig()">SAVE & CLOSE</button>
</div>

<script>
    let sectors = JSON.parse(localStorage.getItem('exam-f1-data')) || [{target: 250}, {target: 250}, {target: 250}];
    let mode = "READY", currentIdx = 0, lapTimes = [], continueSectors = [];
    let timerInterval, startTime = 0, totalElapsedAtPause = 0, lastContStart = 0;

    function renderMain() {
        const list = document.getElementById('sector-list');
        list.innerHTML = '';
        
        sectors.forEach((s, i) => {
            const row = createRow(`Q${i+1}`, s.target, i, false);
            if (mode !== "READY") {
                if (i < currentIdx) row.classList.add('row-past');
                if (i === currentIdx && mode !== "FINISHED") row.classList.add('row-active');
            }
            // 確定したタイムがある場合、またはSTOP中(PAUSED)で現在のセクターの場合に表示
            if (lapTimes[i]) {
                applyStats(row, i, lapTimes[i], s.target);
            } else if (mode === "PAUSED" && i === currentIdx) {
                const currentLapMs = totalElapsedAtPause - (lapTimes.reduce((a, b) => a + b, 0));
                applyStats(row, i, currentLapMs, s.target, false, true); // 判定色はつけない
            }
            list.appendChild(row);
        });

        continueSectors.forEach((cs, i) => {
            const row = createRow(`CONT ${i+1}`, null, i, true);
            row.classList.add('row-cont');
            if (currentIdx === sectors.length + i && mode !== "FINISHED") row.classList.add('row-active');
            if (cs.time) applyStats(row, i, cs.time, null, true);
            else if (mode === "FINISHED" && currentIdx === sectors.length + i) {
                // STOP時のCONTセクター表示
                const cTime = totalElapsedAtPause - lastContStart;
                row.querySelector(`#ct-${i}`).innerText = (cTime/1000).toFixed(2);
            }
            list.appendChild(row);
        });

        renderButtons();
    }

    function createRow(name, target, idx, isCont) {
        const row = document.createElement('div');
        row.className = 'sector-row';
        const tDisp = target ? (target/10).toFixed(1) : "---";
        row.innerHTML = `
            <div class="s-name">${name}</div>
            <div class="s-box"><span class="s-value" id="${isCont?'ct':'t'}-${idx}">--.--</span></div>
            <div class="s-box"><span class="target-val">TG: ${tDisp}</span></div>
            <div class="s-delta-box"><div class="d-tg" id="${isCont?'cd':'d'}-${idx}">---</div></div>
        `;
        return row;
    }

    function applyStats(row, idx, ms, target, isCont = false, isTemp = false) {
        const tEl = row.querySelector(isCont ? `#ct-${idx}` : `#t-${idx}`);
        tEl.innerText = (ms/1000).toFixed(2);
        
        if(!isCont && target) {
            const diff = (Math.floor(ms/100) - target) / 10;
            const dEl = row.querySelector(`#d-${idx}`);
            dEl.innerText = (diff > 0 ? "+" : "") + diff.toFixed(1);
            dEl.className = 'd-tg ' + (diff > 0 ? 'delta-plus' : 'delta-minus');
            if (!isTemp) {
                row.classList.add(diff <= 0 ? 'row-green' : 'row-yellow');
            }
        } else if (isCont) {
            row.classList.add('row-green');
        }
    }

    function renderButtons() {
        const area = document.getElementById('btn-area');
        area.innerHTML = '';
        if (mode === "READY") {
            area.appendChild(createBtn("btn-config", "⚙️", () => { document.getElementById('config-screen').style.display='block'; renderConfig(); }));
            area.appendChild(createBtn("btn-start", "START", startTimer));
        } else if (mode === "RUNNING") {
            area.appendChild(createBtn("btn-start", "STOP", stopTimer));
            if (currentIdx < sectors.length) area.appendChild(createBtn("btn-split", "LAP", lapTimer));
        } else {
            area.appendChild(createBtn("btn-reset", "RESET", resetTimer));
            area.appendChild(createBtn("btn-start", "CONT", resumeTimer));
        }
    }

    function createBtn(c, t, f) {
        const b = document.createElement('button');
        b.className = `f1-btn ${c}`; b.innerText = t; b.onclick = f;
        return b;
    }

    function startTimer() {
        mode = "RUNNING"; startTime = Date.now();
        timerInterval = setInterval(updateTimer, 50);
        renderMain();
    }

    function stopTimer() {
        clearInterval(timerInterval);
        const now = Date.now();
        totalElapsedAtPause += (now - startTime);
        
        if (currentIdx < sectors.length) {
            mode = "PAUSED";
        } else {
            const cIdx = currentIdx - sectors.length;
            continueSectors[cIdx].time = totalElapsedAtPause - lastContStart;
            mode = "FINISHED";
        }
        renderMain(); // ここで再描画してタイムを書き込む
    }

    function resumeTimer() {
        if (mode === "FINISHED") {
            continueSectors.push({time: null});
            currentIdx = sectors.length + continueSectors.length - 1;
            lastContStart = totalElapsedAtPause;
        }
        mode = "RUNNING"; startTime = Date.now();
        timerInterval = setInterval(updateTimer, 50);
        renderMain();
    }

    function lapTimer() {
        const now = Date.now();
        const totalMs = totalElapsedAtPause + (now - startTime);
        const lapMs = totalMs - (lapTimes.reduce((a, b) => a + b, 0));
        lapTimes.push(lapMs);
        currentIdx++;
        if (currentIdx === sectors.length) {
            // 全問終了
            clearInterval(timerInterval);
            totalElapsedAtPause = totalMs;
            mode = "FINISHED";
        }
        renderMain();
    }

    function updateTimer() {
        const now = Date.now();
        const totalMs = totalElapsedAtPause + (now - startTime);
        const m = Math.floor(totalMs/60000), s = Math.floor((totalMs%60000)/1000), ms = Math.floor((totalMs%1000)/10);
        document.getElementById('main-timer').innerHTML = `${m.toString().padStart(2,'0')}<span>:</span>${s.toString().padStart(2,'0')}<span>.</span>${ms.toString().padStart(2,'0')}`;
        
        if (currentIdx < sectors.length) {
            const lapMs = totalMs - (lapTimes.reduce((a, b) => a + b, 0));
            const tEl = document.getElementById(`t-${currentIdx}`);
            if (tEl) tEl.innerText = (lapMs/1000).toFixed(2);
            
            const diff = (Math.floor(lapMs/100) - sectors[currentIdx].target) / 10;
            const dEl = document.getElementById(`d-${currentIdx}`);
            if (dEl) {
                dEl.innerText = (diff > 0 ? "+" : "") + diff.toFixed(1);
                dEl.className = 'd-tg ' + (diff > 0 ? 'delta-plus' : 'delta-minus');
            }
        } else {
            const cIdx = currentIdx - sectors.length;
            const ctEl = document.getElementById(`ct-${cIdx}`);
            if (ctEl) ctEl.innerText = ((totalMs - lastContStart)/1000).toFixed(2);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        mode = "READY"; currentIdx = 0; lapTimes = []; continueSectors = []; totalElapsedAtPause = 0;
        document.getElementById('main-timer').innerHTML = "00<span>:</span>00<span>.</span>00";
        renderMain();
    }

    // --- V18 設定画面用ロジック ---
    function renderConfig() {
        const container = document.getElementById('config-list');
        container.innerHTML = sectors.map((s, i) => `
            <div class="config-item">
                <span>Q${i+1} TARGET (秒)</span>
                <input type="number" step="0.1" class="config-input" value="${(s.target/10).toFixed(1)}" onchange="updateSectorTarget(${i}, this.value)">
            </div>
        `).join('');
    }
    function updateSectorTarget(i, val) { sectors[i].target = parseFloat(val) * 10; }
    function addSectorConfig() { sectors.push({target: 250}); renderConfig(); }
    function removeSectorConfig() { if(sectors.length > 1) sectors.pop(); renderConfig(); }
    function saveConfig() { 
        localStorage.setItem('exam-f1-data', JSON.stringify(sectors));
        document.getElementById('config-screen').style.display='none'; 
        renderMain(); 
    }

    renderMain();
</script>
</body>
</html>
